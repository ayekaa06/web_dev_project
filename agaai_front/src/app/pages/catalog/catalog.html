<div class="container" [style.background]="theme.bg" [style.color]="theme.text">
  <h1>AI Model Index</h1>
  <p style="opacity: 0.6">Explore AI models</p>

  <div class="toolbar-row">
    <input
      class="search"
      placeholder="Search..."
      [(ngModel)]="search"
      (ngModelChange)="onSearch()"
      [style.background]="theme.input"
      [style.color]="theme.text"
      [style.border]="'1px solid ' + theme.border"
    />
    <button class="add-model-btn" (click)="openModal()">Добавить модель</button>
  </div>

  <div class="filters">
    @for (f of filters; track f) {
    <button
      (click)="setFilter(f)"
      [style.background]="filter === f ? '#38bdf8' : theme.input"
      [style.color]="filter === f ? '#000' : theme.text"
      class="filter-btn"
    >
      {{ f }}
    </button>
    }
  </div>

  <div *ngIf="showModal" class="modal-overlay">
    <div
      class="modal-card"
      [style.background]="theme.block"
      [style.border]="'1px solid ' + theme.border"
    >
      <div class="modal-header">
        <h2>Добавить новую модель</h2>
        <button class="close-btn" (click)="closeModal()">×</button>
      </div>

      <div class="field-row">
        <label>Custom display name</label>
        <input [(ngModel)]="newModelForm.custom_name" />
      </div>
      <div class="field-row">
        <label>Model name (uniq)</label>
        <input [(ngModel)]="newModelForm.model_name" />
      </div>
      <div class="field-row">
        <label>Author</label>
        <input [(ngModel)]="newModelForm.author" />
      </div>
      <div class="field-row">
        <label>Version</label>
        <input [(ngModel)]="newModelForm.version" />
      </div>
      <div class="field-row">
        <label>Description</label>
        <textarea [(ngModel)]="newModelForm.description"></textarea>
      </div>
      <div class="field-row">
        <label>Custom note</label>
        <input [(ngModel)]="newModelForm.custom_note" />
      </div>
      <div class="field-row">
        <label>Badges (comma separated)</label>
        <input [(ngModel)]="newModelForm.badges" />
      </div>
      <div class="field-row">
        <label>Prompts</label>
        <div *ngFor="let p of newModelForm.prompts; let i = index" class="array-item">
          <input [(ngModel)]="p.name" placeholder="Name" />
          <textarea [(ngModel)]="p.prompt_template" placeholder="Prompt template"></textarea>
          <button class="remove-btn" (click)="removePrompt(p)">Remove</button>
        </div>
        <button class="add-btn" (click)="addPrompt()">+ Add prompt</button>
      </div>

      <div class="field-row">
        <label>Dependencies</label>
        <div *ngFor="let d of newModelForm.dependencies; let i = index" class="array-item">
          <input [(ngModel)]="d.name" placeholder="Dependency name" />
          <input [(ngModel)]="d.requirement" placeholder="Requirement (e.g. >=2.0)" />
          <button class="remove-btn" (click)="removeDependency(d)">Remove</button>
        </div>
        <button class="add-btn" (click)="addDependency()">+ Add dependency</button>
      </div>

      <div class="field-row">
        <label>Benchmarks</label>
        <div *ngFor="let b of newModelForm.benchmarks; let i = index" class="array-item">
          <input [(ngModel)]="b.name" placeholder="Benchmark name" />
          <input [(ngModel)]="b.description" placeholder="Description" />
          <input type="number" [(ngModel)]="b.value" placeholder="Value" />
          <button class="remove-btn" (click)="removeBenchmark(b)">Remove</button>
        </div>
        <button class="add-btn" (click)="addBenchmark()">+ Add benchmark</button>
      </div>

      <div class="field-row">
        <label>Profiling</label>
        <div *ngFor="let p of newModelForm.profiling; let i = index" class="array-item">
          <input [(ngModel)]="p.name" placeholder="Profiling name" />
          <input [(ngModel)]="p.description" placeholder="Description" />
          <input [(ngModel)]="p.value" placeholder="Value" />
          <button class="remove-btn" (click)="removeProfiling(p)">Remove</button>
        </div>
        <button class="add-btn" (click)="addProfiling()">+ Add profiling</button>
      </div>

      <div class="modal-actions">
        <button (click)="submitModel()" class="submit-btn">Отправить модель</button>
        <button (click)="closeModal()" class="cancel-btn">Отмена</button>
      </div>
    </div>
  </div>

  <div
    class="grid"
    [style.opacity]="visible ? 1 : 0"
    [style.transform]="visible ? 'translateY(0)' : 'translateY(10px)'"
  >
    @for (m of filtered(); track m.record_id) {
    <app-model-card [model]="m" />
    }
  </div>

  @if (filtered.length === 0 && visible) {
  <p class="empty">Ничего не найдено</p>
  }

  <!-- <div *ngIf="submittedModelJson" class="submitted-json" [style.background]="theme.block" [style.border]="'1px solid ' + theme.border">
    <h3>Submitted model payload</h3>
    <pre>{{ submittedModelJson }}</pre>
  </div> -->
</div>
