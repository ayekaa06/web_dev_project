<div *ngIf="model; else notFound" class="container" [style.background]="theme.bg" [style.color]="theme.text">
  <a routerLink="/catalog" class="back">nazad</a>

  <div class="hero" [style.border]="'1px solid ' + theme.border">
    <div>
      <span class="badge">{{ model.type }}</span>
      <h1>{{ model.name }}</h1>
      <p style="opacity: 0.7">{{ model.description }}</p>
    </div>
    <button (click)="toggleSave()" class="heart-btn">{{ saved ? '❤️' : '🤍' }}</button>
  </div>

  <div class="grid">
    <div class="card" [style.background]="theme.block" [style.border]="'1px solid ' + theme.border">
      <h3 class="card-title">Архитектура</h3>
      <p>{{ model.architecture }}</p>
    </div>
    <div class="card" [style.background]="theme.block" [style.border]="'1px solid ' + theme.border">
      <h3 class="card-title">Бенчмарки</h3>
      <p>{{ model.benchmarks }}</p>
    </div>
  </div>

  <div class="note-block" [style.background]="theme.block" [style.border]="'1px solid ' + theme.border">
    <h3 class="card-title">Ваши заметки</h3>
    <textarea [(ngModel)]="note" placeholder="Напишите что-нибудь..." class="textarea"></textarea>
    <button (click)="saveNote()" class="save-btn">Сохранить заметку</button>
  </div>
</div>

<ng-template #notFound>
  <h2 style="color: #fff; padding: 30px">Not found</h2>
</ng-template>
