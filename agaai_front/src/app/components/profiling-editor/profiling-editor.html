<div class="editor-card" *ngIf="model">
  <h3>Добавить профильную метрику</h3>
  <label>Metric</label>
  <input [(ngModel)]="metric" placeholder="Metric name (e.g. Latency)" />
  <label>Value</label>
  <input type="text" [(ngModel)]="value" />
  <div class="actions">
    <button (click)="save()" class="editor-btn">Сохранить</button>
  </div>
</div>
