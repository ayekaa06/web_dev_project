<div class="editor-card" *ngIf="model">
  <h3>Добавить бенчмарк</h3>
  <ul>
    @for (b of model.benchmarks || []; track b.name) {
        <li class="benchmark-item">
          <strong>{{ b.name }}</strong>
          <button class="remove" (click)="remove($index)">x</button>
        </li>
    }
  </ul>
  <label>Choose existing (parsed) or type new</label>
  <select [(ngModel)]="selectedSuggestionName" (ngModelChange)="onSelectExisting($event)">
    <option [ngValue]="null">-- choose existing benchmark --</option>
    @for (b of benchmarks() || []; track b.name) {
      <option [value]="b.name">{{ b.name }}</option>
    }
  </select>

  <div style="margin-top:8px">Or type a new name</div>
  <input [(ngModel)]="benchmark.name" placeholder="Benchmark name" />
  <label>Description (optional)</label>
  <input [(ngModel)]="benchmark.description" placeholder="Description" />
  <label>Value (%)</label>
  <input type="number" [(ngModel)]="value" />
  <div class="actions">
    <button (click)="save()" class="editor-btn">Сохранить</button>
  </div>
</div>
