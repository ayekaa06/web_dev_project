<a [routerLink]="['/models', model.id]" class="card-link">
  <div class="card" [style.background]="theme.card" [style.color]="theme.text">
    <div class="header">
      <h3>{{ model.name }}</h3>
      <span class="badge">{{ model.type }}</span>
    </div>
    <p class="desc">{{ model.description }}</p>
    <button (click)="toggleSave($event)" class="save-btn">
      {{ saved ? '❤️' : '🤍' }}
    </button>
  </div>
</a>
